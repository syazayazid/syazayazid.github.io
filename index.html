<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Syaza Yazid — IT Support</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0c0f;
      --surface:   #101318;
      --border:    #1e242d;
      --accent:    #00e5a0;
      --accent2:   #0077ff;
      --muted:     #4a5568;
      --text:      #e2e8f0;
      --subtext:   #8898aa;
      --mono:      'DM Mono', monospace;
      --display:   'Syne', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* ── animated grid background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: .45;
      pointer-events: none;
    }

    /* ── glowing orbs ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 55% 40% at 15% 80%, rgba(0,229,160,.10) 0%, transparent 70%),
        radial-gradient(ellipse 50% 35% at 85% 15%, rgba(0,119,255,.10) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── card ── */
    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 44px 40px;
      width: min(460px, calc(100vw - 40px));
      box-shadow:
        0 0 0 1px rgba(0,229,160,.07),
        0 32px 80px rgba(0,0,0,.6),
        0 0 60px rgba(0,229,160,.04);
      animation: rise .7s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(28px) scale(.97); }
      to   { opacity: 1; transform: translateY(0)    scale(1);   }
    }

    /* corner accent lines */
    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 28px; height: 28px;
      border-color: var(--accent);
      border-style: solid;
    }
    .card::before {
      top: -1px; left: -1px;
      border-width: 2px 0 0 2px;
      border-radius: 20px 0 0 0;
    }
    .card::after {
      bottom: -1px; right: -1px;
      border-width: 0 2px 2px 0;
      border-radius: 0 0 20px 0;
    }

    /* ── header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 32px;
      animation: rise .7s .1s cubic-bezier(.22,1,.36,1) both;
    }

    .avatar {
      width: 72px; height: 72px;
      border-radius: 16px;
      background: linear-gradient(135deg, #0d1b2a 0%, #0d2a1b 100%);
      border: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--display);
      font-size: 28px;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -1px;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }
    .avatar::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(0,229,160,.12), transparent 60%);
    }

    .name-block {}
    .name {
      font-family: var(--display);
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -.5px;
      line-height: 1;
      margin-bottom: 6px;
    }

    .role-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(0,229,160,.08);
      border: 1px solid rgba(0,229,160,.22);
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: .6px;
      text-transform: uppercase;
    }
    .role-badge::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
      animation: pulse 2s ease infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50%      { opacity: .35; }
    }

    /* ── divider ── */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, var(--accent) 0%, var(--border) 60%, transparent 100%);
      margin-bottom: 28px;
      opacity: .4;
      animation: rise .7s .15s both;
    }

    /* ── section label ── */
    .section-label {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    /* ── skills ── */
    .skills-wrap {
      display: flex; gap: 10px; flex-wrap: wrap;
      margin-bottom: 28px;
      animation: rise .7s .2s both;
    }

    .skill-pill {
      display: flex; align-items: center; gap: 7px;
      background: rgba(255,255,255,.03);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      transition: border-color .2s, background .2s, transform .2s;
      cursor: default;
    }
    .skill-pill:hover {
      border-color: rgba(0,229,160,.35);
      background: rgba(0,229,160,.05);
      transform: translateY(-2px);
    }
    .skill-pill .icon {
      font-size: 15px;
    }

    /* ── fact box ── */
    .fact-box {
      background: rgba(0,119,255,.05);
      border: 1px solid rgba(0,119,255,.18);
      border-left: 3px solid var(--accent2);
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 12.5px;
      color: var(--subtext);
      line-height: 1.6;
      animation: rise .7s .25s both;
    }
    .fact-box strong {
      color: var(--text);
      font-weight: 500;
    }
    .fact-tag {
      display: inline-block;
      background: rgba(0,119,255,.15);
      color: #60a5fa;
      border-radius: 4px;
      padding: 1px 7px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .3px;
    }

    /* ── footer ── */
    .footer {
      margin-top: 28px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      animation: rise .7s .3s both;
    }
    .footer-mono {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: .5px;
    }
    .status-dot {
      display: flex; align-items: center; gap: 6px;
      font-size: 10px;
      color: var(--accent);
    }
    .status-dot::before {
      content: '';
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 1.8s ease infinite;
    }
  </style>
</head>
<body>

  <div class="card">

    <div class="header">
      <div class="avatar">SY</div>
      <div class="name-block">
        <div class="name">Syaza Yazid</div>
        <span class="role-badge">IT Support</span>
      </div>
    </div>

    <div class="divider"></div>

    <div class="section-label">// Kemahiran</div>
    <div class="skills-wrap">
      <div class="skill-pill"><span class="icon">🐧</span> Linux</div>
      <div class="skill-pill"><span class="icon">🔧</span> Troubleshooting</div>
    </div>

    <div class="section-label">// Sedang Belajar</div>
    <div class="fact-box">
      Saya kini mengikuti kelas <strong>DevOps</strong> anjuran
      <span class="fact-tag">Infranitify</span> — dalam perjalanan mendalami
      automation, CI/CD &amp; infrastruktur moden.
    </div>

    <div class="footer">
      <span class="footer-mono">syaza.yazid</span>
      <span class="status-dot">available for work</span>
    </div>

  </div>

</body>
</html>
